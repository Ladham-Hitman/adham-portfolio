<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adham Amgad | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#020617;
  color:#e2e8f0;
}

/* subtle industrial background */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(56,189,248,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(59,130,246,0.08), transparent 40%);
  z-index:-1;
}

/* header */
header{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

header img{
  width:150px;
  height:150px;
  border-radius:50%;
  border:3px solid #38bdf8;
  margin-bottom:15px;
}

h1{font-size:2.5rem;}
p{opacity:0.7;margin-top:10px;}

section{
  max-width:900px;
  margin:auto;
  padding:50px 20px;
}

h2{
  color:#38bdf8;
  margin-bottom:15px;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  border:1px solid #1e293b;
  margin-bottom:15px;
}

.card:hover{
  border-color:#38bdf8;
}

footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
  <img src="https://via.placeholder.com/150">
  <h1>Adham Amgad</h1>
  <p>Industrial Automation Engineer</p>
  <p style="font-size:0.9rem;opacity:0.5;">
    PLC • SCADA • DCS • Industry 4.0
  </p>
</header>

<section>
  <h2>About</h2>
  <div class="card">
    Automation engineer specialized in PLC, SCADA, and industrial systems.
  </div>
</section>

<footer>
  © 2026 Adham Amgad
</footer>

</body>
</html>
